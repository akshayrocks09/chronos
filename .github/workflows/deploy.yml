name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: chronos/chronos/chronos-ui/package-lock.json

      - name: Install Dependencies
        run: |
          cd chronos/chronos/chronos-ui
          npm install

      - name: Build
        run: |
          cd chronos/chronos/chronos-ui
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: chronos/chronos/chronos-ui/dist
          branch: gh-pages
