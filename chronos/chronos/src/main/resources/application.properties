spring.application.name=chronos

# Active profile (override via env: SPRING_PROFILES_ACTIVE=mysql)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Server
server.port=${PORT:8080}
server.tomcat.threads.max=400

# JPA — disable open-in-view to prevent N+1 lazy-load issues across HTTP request lifecycle
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# JWT
chronos.jwt.secret=${JWT_SECRET}
chronos.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Quartz thread pool
spring.quartz.properties.org.quartz.threadPool.threadCount=10

# Mail — all credentials must come from environment variables, never hardcoded
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Job defaults (can be overridden per job)
chronos.job.max-retries=3
chronos.job.retry-delay-seconds=10

# Logging
logging.level.com.chronos=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/chronos.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Stability and Scalability
chronos.jobs.max-per-user=${MAX_JOBS_PER_USER:50}
chronos.jobs.trigger-cooldown-seconds=${TRIGGER_COOLDOWN_SECONDS:30}
chronos.logs.retention-days=${LOG_RETENTION_DAYS:30}
