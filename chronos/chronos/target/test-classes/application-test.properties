spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.liquibase.enabled=true

# Security Config for Tests
JWT_SECRET=super-secret-key-for-testing-purposes-only-12345
ADMIN_PASSWORD=admin-test-pass

# Mail Config for Tests
MAIL_USERNAME=test@chronos.local
MAIL_PASSWORD=test-pass

# Job defaults
chronos.job.max-retries=3
chronos.job.retry-delay-seconds=10

# Quartz Test Config - Use memory store for tests
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5
