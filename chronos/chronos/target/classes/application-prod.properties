# Production profile — all secrets via environment variables.
# Activate with: SPRING_PROFILES_ACTIVE=prod

# Include MySQL settings
spring.profiles.include=mysql

# Stricter security in prod
server.error.include-stacktrace=never
server.error.include-message=never

# H2 console must be off in prod
spring.h2.console.enabled=false

# Logging — no file rotation config needed if running in a container (stdout → log aggregator)
logging.level.com.chronos=WARN
logging.level.root=WARN
