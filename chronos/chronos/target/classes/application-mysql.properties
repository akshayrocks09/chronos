# ============================================================
# MySQL & Persistent Quartz (Production/Staging)
# ============================================================

# MySQL DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chronos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
# SECURITY: Do not use empty passwords in staging/production.
# Defaulting to 'root' for local dev consistency with docker-compose.
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Liquibase handles schema migrations; Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate

# Persistent Quartz Store (Cluster-ready)
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000
