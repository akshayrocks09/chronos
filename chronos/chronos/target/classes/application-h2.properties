# H2 in-memory database for local development
spring.datasource.url=jdbc:h2:mem:chronosdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Do NOT set spring.jpa.database-platform for H2 — Hibernate auto-detects it (HHH90000025)
spring.jpa.hibernate.ddl-auto=none

# Quartz in-memory for dev
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# H2 console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
