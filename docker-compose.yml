version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chronos-mysql
    restart: always
    environment:
      MYSQL_DATABASE: chronos_db
      # SECURITY: Always set a strong root password for production.
      # Defaulting to 'root' for local dev convenience, but recommend setting MYSQL_ROOT_PASSWORD env var.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
